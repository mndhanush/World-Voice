<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Log in to your WorldVoice Student Portal.">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <title>Login | WorldVoice</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'teal-primary': '#0F766E', 
                        'orange-secondary': '#EA580C',
                        bgLight: '#FFFFFF',
                        bgDark: '#0F172A',    
                        cardLight: '#F8FAFC',
                        cardDark: '#1E293B',
                        textLight: '#111827',
                        textDark: '#F9FAFB'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Outfit', 'sans-serif'], 
                    },
                    screens: {
                        'xs': '360px', 'sm': '390px', 'md': '768px', 
                        'lg': '1024px', 'xl': '1280px', '2xl': '1536px', 
                    }
                }
            }
        }
    </script>
    
    <style>
        :root {
            --bg-color: #FFFFFF;
            --text-color: #111827;
            --text-muted: #4B5563;
            --card-bg: #F8FAFC;
            --border-color: #E5E7EB;
            --nav-bg: rgba(255, 255, 255, 0.95);
            --hover-highlight: #0F766E;
        }
        
        .dark {
            --bg-color: #0F172A;
            --text-color: #F9FAFB;
            --text-muted: #9CA3AF;
            --card-bg: #1E293B;
            --border-color: #334155;
            --nav-bg: rgba(15, 23, 42, 0.95);
            --hover-highlight: #0F766E;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
            font-weight: 400; 
        }

        .no-transition * {
            transition: none !important;
        }

        .text-body-muted { color: var(--text-muted); transition: color 0.3s ease; }
        .bg-card { background-color: var(--card-bg); border-color: var(--border-color); }
        .border-theme { border-color: var(--border-color); }

        /* Clean Navbar */
        .glass-nav {
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
        }

        /* Utilities */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--hover-highlight); }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeInUp 0.8s ease-out;
        }
    </style>
</head>
<body class="antialiased font-normal h-screen overflow-hidden flex flex-col">

    <nav class="fixed w-full top-0 z-[100] glass-nav transition-all duration-300 shadow-sm">
        <div class="container mx-auto px-4 md:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                
                <a href="index.html" class="flex items-center gap-2 shrink-0">
                    <span class="font-serif text-2xl font-bold tracking-widest text-teal-primary uppercase whitespace-nowrap">World<span class="text-orange-secondary">Voice</span></span>
                </a>

                <div class="flex items-center gap-2 sm:gap-3 flex-shrink-0">
                    <a href="index.html" class="text-[10px] uppercase tracking-wider font-bold text-gray-800 dark:text-gray-200 hover:text-teal-primary dark:hover:text-teal-primary transition-colors px-2 hidden sm:block">Back to Site</a>
                    
                    <button id="theme-toggle" class="relative w-[56px] xl:w-[64px] h-[26px] xl:h-[30px] flex items-center bg-gray-200 dark:bg-gray-700 rounded-full p-1 transition-colors duration-300 focus:outline-none border border-gray-300 dark:border-gray-600 overflow-hidden" title="Toggle Theme">
                        <span class="text-[7px] xl:text-[8px] font-bold text-gray-500 absolute end-2.5 dark:opacity-0 transition-opacity duration-300 tracking-wider">LGT</span>
                        <span class="text-[7px] xl:text-[8px] font-bold text-gray-300 absolute start-2.5 opacity-0 dark:opacity-100 transition-opacity duration-300 tracking-wider">DRK</span>
                        
                        <div class="w-[18px] xl:w-[20px] h-[18px] xl:h-[20px] bg-white dark:bg-dark-bg border border-gray-200 dark:border-gray-600 rounded-full shadow-sm transform transition-transform duration-300 flex items-center justify-center rtl:dark:-translate-x-[30px] xl:rtl:dark:-translate-x-[34px] ltr:dark:translate-x-[30px] xl:ltr:dark:translate-x-[34px] dark:translate-x-[30px] xl:dark:translate-x-[34px] z-10">
                            <i class="fas fa-sun text-[8px] xl:text-[9px] text-orange-secondary dark:hidden block"></i>
                            <i class="fas fa-moon text-[8px] xl:text-[9px] text-teal-primary hidden dark:block"></i>
                        </div>
                    </button>
                    
                    <button id="rtl-toggle" class="text-[9px] xl:text-[10px] font-bold text-gray-500 hover:text-teal-primary transition-colors duration-300 px-3 py-1.5 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 border border-gray-300 dark:border-gray-600" title="Toggle RTL">
                        RTL
                    </button>
                </div>

            </div>
        </div>
    </nav>

    <div class="absolute top-20 start-10 w-72 h-72 bg-teal-primary/10 rounded-full blur-3xl animate-pulse pointer-events-none z-0"></div>
    <div class="absolute bottom-20 end-10 w-96 h-96 bg-orange-secondary/10 rounded-full blur-3xl animate-pulse pointer-events-none z-0" style="animation-delay: 1.5s;"></div>

    <div class="flex-1 overflow-y-auto flex items-center justify-center p-4 pt-20 relative z-10">
        <div class="w-full max-w-[340px] bg-card border border-theme shadow-2xl p-6 animate-fade-in group rounded-2xl relative overflow-hidden z-10">
            
            <div class="absolute top-0 start-0 w-full h-1 bg-gradient-to-r from-teal-primary to-orange-secondary"></div>

            <div class="text-center mb-6">
                <h2 class="font-serif text-2xl font-bold text-[var(--text-color)] uppercase tracking-tight mb-2">Welcome Back.</h2>
            </div>

            <form class="flex flex-col gap-4" onsubmit="handleLogin(event)">

                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-[var(--text-muted)] mb-2">
                        Email Address
                    </label>
                    <input 
                        type="email" 
                        required
                        placeholder="STUDENT@EXAMPLE.COM"
                        class="w-full px-3 py-3 bg-[var(--bg-color)] border border-theme text-[var(--text-color)] text-xs uppercase tracking-widest focus:outline-none focus:border-teal-primary focus:ring-1 focus:ring-teal-primary rounded-lg transition-all"
                    />
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-[var(--text-muted)] mb-2">
                        Password
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password"
                            required
                            placeholder="ENTER YOUR PASSWORD"
                            class="w-full px-3 py-3 bg-[var(--bg-color)] border border-theme text-[var(--text-color)] text-xs uppercase tracking-widest focus:outline-none focus:border-teal-primary focus:ring-1 focus:ring-teal-primary rounded-lg transition-all"
                        />
                        <button 
                            type="button" 
                            onclick="togglePassword()"
                            class="absolute end-3 top-1/2 -translate-y-1/2 text-[var(--text-muted)] hover:text-teal-primary transition-colors"
                        >
                            <i class="fas fa-eye text-sm" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between text-[10px] sm:text-xs pt-1">
                    <label class="flex items-center cursor-pointer group-checkbox">
                        <input type="checkbox" class="w-3 h-3 sm:w-4 sm:h-4 rounded border-theme text-teal-primary focus:ring-teal-primary bg-[var(--bg-color)]">
                        <span class="ms-2 text-body-muted font-bold uppercase tracking-widest">Remember me</span>
                    </label>
                    <span class="text-teal-primary font-bold uppercase tracking-widest cursor-pointer hover:text-orange-secondary transition-colors">
                        Forgot password?
                    </span>
                </div>

                <button 
                    type="submit"
                    class="w-full py-3 mt-4 bg-teal-primary text-white hover:bg-orange-secondary font-bold uppercase tracking-widest text-xs transition-all duration-300 flex items-center justify-center gap-2 rounded-full shadow-lg shadow-teal-primary/20"
                >
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right text-[10px] rtl:rotate-180"></i>
                </button>

                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-theme"></div>
                    </div>
                    <div class="relative flex justify-center text-[10px] uppercase tracking-widest font-bold">
                        <span class="px-3 bg-card text-[var(--text-muted)]">Or Continue With</span>
                    </div>
                </div>

                <div class="flex flex-col gap-3">
                    <button 
                        type="button"
                        class="flex items-center justify-center w-full px-3 py-2.5 border border-theme hover:border-teal-primary transition-colors bg-[var(--bg-color)] rounded-full gap-2 shadow-sm"
                    >
                        <svg class="w-4 h-4" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        <span class="text-[10px] font-bold uppercase tracking-widest text-[var(--text-color)]">Google</span>
                    </button>

                    <button 
                        type="button"
                        class="flex items-center justify-center w-full px-3 py-2.5 border border-theme hover:border-teal-primary transition-colors bg-[var(--bg-color)] rounded-full gap-2 shadow-sm"
                    >
                        <i class="fab fa-apple text-base text-[var(--text-color)]"></i>
                        <span class="text-[10px] font-bold uppercase tracking-widest text-[var(--text-color)]">Apple</span>
                    </button>
                </div>

            </form>

            <div class="mt-6 text-center text-[10px] sm:text-xs font-bold uppercase tracking-widest text-body-muted">
                No Account? 
                <a href="register.html" class="text-teal-primary hover:text-orange-secondary transition-colors ms-1 border-b border-teal-primary pb-0.5">
                    Sign Up
                </a>
            </div>

        </div>
    </div>

    <script>
        // --- Password Visibility Toggle ---
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // --- Handle Login Submission ---
        function handleLogin(event) {
            event.preventDefault();

            const button = event.target.querySelector('button[type="submit"]');
            const icon = button.querySelector('i');
            const span = button.querySelector('span');
            
            icon.className = 'fas fa-spinner fa-spin';
            span.innerText = 'AUTHENTICATING...';
            button.disabled = true;
            button.classList.add('opacity-50', 'cursor-not-allowed');

            setTimeout(() => {
                window.location.href = 'user-dashboard.html';
            }, 1500);
        }

        // --- Standard Theme Toggle Logic ---
        const htmlElement = document.documentElement;
        const themeToggleBtns = document.querySelectorAll('#theme-toggle');

        function updateTheme() {
            const isDark = htmlElement.classList.contains('dark');
            
            themeToggleBtns.forEach(btn => {
                const iconSun = btn.querySelector('.fa-sun');
                const iconMoon = btn.querySelector('.fa-moon');
                if (iconSun && iconMoon) {
                    if (isDark) {
                        iconSun.classList.add('hidden');
                        iconMoon.classList.remove('hidden');
                    } else {
                        iconSun.classList.remove('hidden');
                        iconMoon.classList.add('hidden');
                    }
                }
            });
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        themeToggleBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation(); 
                htmlElement.classList.toggle('dark');
                updateTheme();
            });
        });

        // Initialize Theme Based on LocalStorage (Default to Light if not set)
        if (localStorage.getItem('theme') === 'dark') {
            htmlElement.classList.add('dark');
        } else {
            htmlElement.classList.remove('dark'); // Default to light mode
        }
        updateTheme();

        // --- Standard RTL Toggle Logic ---
        const rtlToggleBtns = document.querySelectorAll('#rtl-toggle, .rtl-toggle-btn');
        function toggleRTL(e) {
            if(e) { e.preventDefault(); e.stopPropagation(); }
            document.body.classList.add('no-transition');
            if (htmlElement.getAttribute('dir') === 'rtl') {
                htmlElement.removeAttribute('dir');
                localStorage.setItem('direction', 'ltr');
            } else {
                htmlElement.setAttribute('dir', 'rtl');
                localStorage.setItem('direction', 'rtl');
            }
            setTimeout(() => { document.body.classList.remove('no-transition'); }, 50);
        }

        rtlToggleBtns.forEach(btn => {
            btn.addEventListener('click', toggleRTL);
        });
        
        // Initialize RTL from local storage
        if (localStorage.getItem('direction') === 'rtl') {
            htmlElement.setAttribute('dir', 'rtl');
        }

        // --- Navbar Scroll Effect ---
        window.addEventListener('scroll', () => {
            const nav = document.querySelector('nav');
            if (window.scrollY > 10) {
                nav.classList.add('shadow-md');
                nav.style.background = 'var(--bg-color)'; 
            } else {
                nav.classList.remove('shadow-md');
                nav.style.background = 'var(--nav-bg)';
            }
        });
    </script>
</body>
</html>

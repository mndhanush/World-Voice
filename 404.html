<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found | WorldVoice</title>
  <meta name="description" content="The page you are looking for is not found.">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    tailwind.config = { 
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'teal-primary': '#0F766E', 
            'orange-secondary': '#EA580C',
            'light-bg': '#FFFFFF',
            'light-surface': '#F8FAFC',
            'dark-bg': '#0F172A',
            'dark-surface': '#1E293B'
          },
          animation: {
            'gradient-x': 'gradient-x 3s ease infinite',
          },
          keyframes: {
            'gradient-x': {
              '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
              '50%': { 'background-size': '200% 200%', 'background-position': 'right center' },
            }
          }
        }
      }
    }
  </script>

  <style>
    [dir="rtl"] { direction: rtl; }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeInUp 0.8s ease-out; }

    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="font-sans antialiased transition-colors duration-300 bg-light-bg dark:bg-dark-bg text-gray-800 dark:text-gray-100 flex flex-col min-h-screen relative">

  <main class="flex-grow flex items-center justify-center relative overflow-hidden pt-[120px] pb-24">
    
    <div class="absolute top-1/4 left-1/4 w-72 h-72 bg-teal-primary/20 dark:bg-teal-primary/10 rounded-full blur-[100px] animate-pulse z-0 pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-orange-secondary/20 dark:bg-orange-secondary/10 rounded-full blur-[120px] animate-pulse z-0 pointer-events-none" style="animation-delay: 2s;"></div>

    <div class="container mx-auto px-4 text-center z-10 animate-fade-in relative">
        
        <div class="inline-flex items-center gap-2 px-5 py-2 rounded-full bg-light-surface dark:bg-dark-surface border border-gray-200 dark:border-gray-700 font-bold tracking-widest uppercase text-[10px] mb-8 text-gray-800 dark:text-gray-200 shadow-sm">
            <span class="w-2 h-2 rounded-full bg-orange-secondary animate-ping"></span>
            Error 404
        </div>
        
        <h1 class="text-[120px] md:text-[200px] font-bold text-transparent bg-clip-text bg-gradient-to-br from-teal-primary via-[#2dd4bf] to-orange-secondary animate-gradient-x leading-none mb-6 drop-shadow-xl tracking-tight">
            404
        </h1>
        
        <h2 class="text-3xl md:text-5xl font-bold mb-6 leading-tight text-gray-900 dark:text-white uppercase tracking-tight">
            Out of Bounds!
        </h2>
        
        <p class="text-sm md:text-base text-gray-600 dark:text-gray-400 max-w-lg mx-auto font-medium mb-10 leading-relaxed">
            Looks like you've jumped a little too high! The page you are looking for has bounced away, changed its name, or is temporarily unavailable.
        </p>

        <a href="index.html" class="inline-flex items-center justify-center gap-3 bg-teal-primary text-white px-10 py-4 rounded-full font-bold uppercase tracking-widest text-xs hover:bg-orange-secondary transition-all duration-300 transform hover:-translate-y-1 shadow-lg shadow-teal-primary/20">
            <i class="fas fa-home"></i> Return to Home
        </a>
    </div>
  </main>

</body>
</html>
